name: LegendaryItems
main: com.legendary.LegendaryItems
version: 1.1.0
api: ["1.0.5"]
author: Balzikz
website: https://github.com/balzikz/LegendaryWeapons
description: Legendary weapons plugin for Battle Royale in NukkitMOT

commands:
  leg:
    description: "Список легендарных оружий, их крафты и тестовая выдача"
    usage: "/leg [id|give]"
    permission: legendaryitems.command.leg

permissions:
  legendaryitems.command.leg:
    description: "Разрешает использовать /leg"
    default: true
  legendaryitems.command.give:
    description: "Разрешает выдачу легендарных оружий через /leg give"
    default: op
