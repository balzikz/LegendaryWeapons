# ======================================================
# LegendaryItems / config.yml
# Battle Royale легендарки для NukkitMOT
# ======================================================
# cooldown-ticks / duration-ticks указаны в тиках.
# 20 тиков = 1 секунда. 

weapons:
  harpoon:
    enabled: true
    type: HARPOON
    once-per-world: true

    item:
      material: "minecraft:fishing_rod"
      name: "§6§lГарпун"
      lore:
        - "§7Выстреливает невидимый крюк."
        - "§7Если попал в блок — притянет тебя к точке попадания."
        - "§7Если попал в моба или игрока — притянет цель к тебе."
        - "§8Легендарное оружие Battle Royale"
      unbreakable: true

    recipe:
      enabled: true
      shape:
        - " II"
        - " SI"
        - "R  "
      ingredients:
        I: "minecraft:iron_ingot"
        S: "minecraft:string"
        R: "minecraft:stick"

    ability:
      cooldown-ticks: 60
      projectile-speed: 1.8
      pull-speed: 1.15
      max-flight-ticks: 40
      max-pull-ticks: 80
      min-distance: 1.75
      vertical-cap: 0.95
      step-boost: 0.42
      stuck-ticks: 14
      fall-immunity-ticks: 20
      pull-players: true
      pull-mobs: true

  voodoo_doll:
    enabled: true
    type: VOODOO_DOLL
    once-per-world: true

    item:
      material: "minecraft:totem_of_undying"
      name: "§5§lКукла Вуду"
      lore:
        - "§7Ударь игрока, чтобы наложить связь."
        - "§7Пока связь активна, цель получает"
        - "§7весь урон владельца с бонусом."
        - "§8Легендарное оружие Battle Royale"
      unbreakable: true

    recipe:
      enabled: true
      shape:
        - " S "
        - "LNL"
        - " R "
      ingredients:
        S: "minecraft:string"
        L: "minecraft:leather"
        N: "minecraft:gold_nugget"
        R: "minecraft:redstone"

    ability:
      cooldown-ticks: 60
      duration-ticks: 120
      bonus-damage-percent: 30.0
      cancel-hit-damage: true
      require-same-world: true
      break-on-owner-death: true
      break-on-target-death: true
      allow-retarget: true
      mirrored-causes:
        - "ENTITY_ATTACK"
        - "PROJECTILE"
        - "FIRE"
        - "FIRE_TICK"
        - "LAVA"
        - "BLOCK_EXPLOSION"
        - "ENTITY_EXPLOSION"
        - "FALL"
        - "CONTACT"
        - "DROWNING"
        - "MAGIC"
        - "POISON"
        - "SUFFOCATION"
        - "THORNS"
        - "VOID"
        - "CUSTOM"

  shrink_ray:
    enabled: true
    type: SHRINK_RAY
    once-per-world: true

    item:
      material: "minecraft:blaze_rod"
      name: "§b§lShrink Ray"
      lore:
        - "§7Shift + ПКМ — уменьшает тебя."
        - "§7ПКМ — стреляет лучом, увеличивающим врага."
        - "§7Одновременно активна только одна способность."
        - "§8Легендарное оружие Battle Royale"
      unbreakable: true

    recipe:
      enabled: true
      shape:
        - "GGG"
        - "RBR"
        - " D "
      ingredients:
        G: "minecraft:glass_pane"
        R: "minecraft:redstone"
        B: "minecraft:blaze_rod"
        D: "minecraft:diamond"

    ability:
      cooldown-ticks: 60
      duration-ticks: 120
      ray-range: 18.0
      ray-step: 0.35
      self-height-blocks: 1.0
      target-height-blocks: 4.0
      self-speed-effect: true
      self-speed-amplifier: 1
      target-slowness-effect: true
      target-slowness-amplifier: 0

  death_note:
    enabled: true
    type: DEATH_NOTE
    once-per-world: true

    item:
      material: "minecraft:book"
      name: "§4§lТетрадь смерти"
      lore:
        - "§7ПКМ открывает форму для имени жертвы."
        - "§7Жертва получит шанс выжить, если угадает владельца."
        - "§7Работает только по игрокам в выживании."
        - "§8Легендарное оружие Battle Royale"
      unbreakable: true

    recipe:
      enabled: true
      shape:
        - "RFR"
        - "BQB"
        - "RGR"
      ingredients:
        R: "minecraft:redstone"
        F: "minecraft:feather"
        B: "minecraft:book"
        Q: "minecraft:quartz"
        G: "minecraft:gold_ingot"

    ability:
      # Такой же стартовый кулдаун, как и у остальных легендарок
      cooldown-ticks: 60

      # Сколько времени у жертвы на отгадку владельца
      duration-ticks: 300

      # Сколько неверных имён можно написать в чат
      attempts: 3

      # Безопасные ограничения
      only-survival-targets: true
      require-same-world: true
      bind-to-craft-world: true
      break-on-owner-death: true
      break-on-target-death: true
