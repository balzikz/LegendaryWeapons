# ======================================================
# LegendaryItems / config.yml
# Battle Royale легендарки для NukkitMOT
# ======================================================
# cooldown-ticks / duration-ticks указаны в тиках.
# 20 тиков = 1 секунда.

weapons:
  harpoon:
    enabled: true
    type: HARPOON

    # true = в каждом отдельном мире это оружие можно скрафтить только 1 раз
    once-per-world: true

    item:
      material: "minecraft:fishing_rod"
      name: "§6§lГарпун"
      lore:
        - "§7Выстреливает невидимый крюк."
        - "§7Если попал в блок — притянет тебя к точке попадания."
        - "§7Если попал в моба или игрока — притянет цель к тебе."
        - "§8Легендарное оружие Battle Royale"
      unbreakable: true

    recipe:
      enabled: true
      shape:
        - " II"
        - " SI"
        - "R  "
      ingredients:
        I: "minecraft:iron_ingot"
        S: "minecraft:string"
        R: "minecraft:stick"

    ability:
      cooldown-ticks: 60
      projectile-speed: 1.8
      pull-speed: 1.15
      max-flight-ticks: 40
      max-pull-ticks: 80
      min-distance: 1.75
      vertical-cap: 0.95
      step-boost: 0.42
      stuck-ticks: 14
      fall-immunity-ticks: 20
      pull-players: true
      pull-mobs: true

  voodoo_doll:
    enabled: true
    type: VOODOO_DOLL

    # true = в каждом отдельном мире это оружие можно скрафтить только 1 раз
    once-per-world: true

    item:
      material: "minecraft:totem_of_undying"
      name: "§5§lКукла Вуду"
      lore:
        - "§7Ударь игрока, чтобы наложить связь."
        - "§7Пока связь активна, цель получает"
        - "§7весь урон владельца с бонусом."
        - "§8Легендарное оружие Battle Royale"
      unbreakable: true

    recipe:
      enabled: true
      shape:
        - " S "
        - "LNL"
        - " R "
      ingredients:
        S: "minecraft:string"
        L: "minecraft:leather"
        N: "minecraft:gold_nugget"
        R: "minecraft:redstone"

    ability:
      # Такой же стартовый кулдаун, как у гарпуна
      cooldown-ticks: 60

      # Сколько держится связь между владельцем и целью
      duration-ticks: 120

      # Жертва получает урон владельца + этот процент сверху
      bonus-damage-percent: 30.0

      # После удара куклой прямой урон по цели не проходит,
      # вместо этого только накладывается связь
      cancel-hit-damage: true

      # При выходе в другой мир связь рвётся
      require-same-world: true

      # Защитные флаги на смерть
      break-on-owner-death: true
      break-on-target-death: true

      # Если true, владелец может перевесить связь на новую цель,
      # ударив её куклой заново после отката
      allow-retarget: true

      # Какие причины урона зеркалить на жертву
      mirrored-causes:
        - "ENTITY_ATTACK"
        - "PROJECTILE"
        - "FIRE"
        - "FIRE_TICK"
        - "LAVA"
        - "BLOCK_EXPLOSION"
        - "ENTITY_EXPLOSION"
        - "FALL"
        - "CONTACT"
        - "DROWNING"
        - "MAGIC"
        - "POISON"
        - "SUFFOCATION"
        - "THORNS"
        - "VOID"
        - "CUSTOM"

  shrink_ray:
    enabled: true
    type: SHRINK_RAY

    # true = в каждом отдельном мире это оружие можно скрафтить только 1 раз
    once-per-world: true

    item:
      material: "minecraft:blaze_rod"
      name: "§b§lShrink Ray"
      lore:
        - "§7Shift + ПКМ — уменьшает тебя."
        - "§7ПКМ — стреляет лучом, увеличивающим врага."
        - "§7Одновременно активна только одна способность."
        - "§8Легендарное оружие Battle Royale"
      unbreakable: true

    recipe:
      enabled: true
      shape:
        - "GGG"
        - "RBR"
        - " D "
      ingredients:
        G: "minecraft:glass_pane"
        R: "minecraft:redstone"
        B: "minecraft:blaze_rod"
        D: "minecraft:diamond"

    ability:
      # Такой же стартовый кулдаун, как у остальных легендарок
      cooldown-ticks: 60

      # Сколько секунд держится уменьшение / увеличение
      duration-ticks: 120

      # Дальность луча и шаг проверки попадания
      ray-range: 18.0
      ray-step: 0.35

      # Желаемая высота в блоках, не scale.
      # Внутри плагин сам переведёт это в scale.
      self-height-blocks: 1.0
      target-height-blocks: 4.0

      # Баффы к движению
      self-speed-effect: true
      self-speed-amplifier: 1
      target-slowness-effect: true
      target-slowness-amplifier: 0
