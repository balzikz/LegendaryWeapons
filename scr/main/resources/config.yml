# ======================================================
# LegendaryItems / config.yml
# MVP-версия под Battle Royale
# Пока здесь только первое оружие: Гарпун
# ======================================================

weapons:
  harpoon:
    enabled: true
    type: HARPOON

    # true = в каждом отдельном мире это оружие можно скрафтить только 1 раз
    once-per-world: true

    item:
      # Для MVP берём обычную удочку как основу.
      # Потом можно легко заменить на любой другой item id.
      material: "minecraft:fishing_rod"
      name: "§6§lГарпун"
      lore:
        - "§7Выстреливает невидимый крюк."
        - "§7Если попал в блок — притянет тебя к точке попадания."
        - "§7Если попал в моба или игрока — притянет цель к тебе."
        - "§8Легендарное оружие Battle Royale"
      unbreakable: true

    recipe:
      enabled: true
      shape:
        - " II"
        - " SI"
        - "R  "
      ingredients:
        I: "minecraft:iron_ingot"
        S: "minecraft:string"
        R: "minecraft:stick"

    ability:
      # 20 тиков = 1 секунда
      cooldown-ticks: 60

      # Скорость снежка-крюка
      projectile-speed: 1.8

      # Базовая сила притягивания
      pull-speed: 1.15

      # Сколько максимум живёт выпущенный крюк
      max-flight-ticks: 40

      # Сколько максимум тиков идёт подтягивание
      max-pull-ticks: 80

      # Когда считаем, что цель уже достигнута
      min-distance: 1.75

      # Ограничитель вертикального импульса вверх
      vertical-cap: 0.95

      # Помощь при подъёме на край/уступ, чтобы меньше застревать
      step-boost: 0.42

      # Если прогресс к точке не идёт слишком долго — останавливаем безопасно
      stuck-ticks: 14

      # Защита от урона падением после завершения притягивания
      fall-immunity-ticks: 20

      # Можно ли тянуть игроков и мобов при попадании в сущность
      pull-players: true
      pull-mobs: true
